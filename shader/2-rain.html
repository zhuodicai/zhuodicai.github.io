<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>rain</title>
<style>
    html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d0c1b;
    }
    canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>
</head>
<body>

<canvas id="gl"></canvas>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
}
addEventListener("resize", resize);
resize();

const vertexShaderSource = `
attribute vec2 position;

void main() {
    gl_Position = vec4(position, 0.0, 1.0);
}
`;

// ===== 在这里玩 shader =====
const fragmentShaderSource = `
precision highp float;

uniform float time;
uniform vec2 resolution;

#define PI 3.14159265359

// 随机函数
float hash(float n){
    return fract(sin(n)*43758.5453);
}

// 雨滴拖尾（细亮雨线）
float rainTrail(vec2 pixel, vec2 pos, float size){
    vec2 d = pixel - pos;

    // 雨线主体
    float line = 0.02 / max(abs(d.x),0.001);

    // 限制长度
    line *= smoothstep(size,0.0,abs(d.y));

    // 距离衰减
    line *= smoothstep(size,0.0,length(d));

    return line;
}

// 落地后的水面波纹
float ripple(vec2 pixel, vec2 center, float t){
    // 拉伸Y轴，模拟地面透视
    float dist = length((pixel - center) * vec2(1.0, 3.5));

    // 波纹扩散半径
    float radius = (0.05 + 0.8 * t) * 15.0;

    // 主环宽度
    float width = 1.5;

    // 主亮环
    float ring = smoothstep(radius - width, radius, dist) -
                 smoothstep(radius, radius + width, dist);

    // 柔和光晕
    float glow = exp(-pow((dist - radius) / 8.0, 2.0));

    // 外圈衰减
    ring *= 1.0 - smoothstep(radius + 10.0, radius + 20.0, dist);

    // 主环 + 光晕
    float ripple = ring + glow * 0.35;

    // 随时间消失
    ripple *= 1.0 - smoothstep(0.0, 0.8, t);

    return ripple;
}

void main(){
    vec2 p = gl_FragCoord.xy;

    // 雨夜背景
    // vec3 color = vec3(0.015,0.02,0.0);
    vec3 color = vec3(0.0); // 透明

    float rain = 0.0;
    float waves = 0.0;

    // 雨滴数量
    const float DROP_COUNT = 10.0;

    // 雨滴下降时间
    float fallTime = 0.8;

    // 雨滴完整生命周期
    float lifeTime = 1.5;


    for(float i = 0.0; i < DROP_COUNT; i++){

        float id = i;

        // 每颗雨滴独立循环时间
        float localTime = mod(
            time + id * 0.37,
            lifeTime
        );

        // 随机生成雨滴起点
        float x = hash(id) * resolution.x;

        vec2 start = vec2(
            x,
            resolution.y + 40.0
        );

        // 雨滴速度
        vec2 velocity = vec2(
            20.0 + hash(id + 5.0) * 40.0,
            -resolution.y / fallTime
        );


        if(localTime < fallTime){
            // 空中下落阶段
            vec2 pos = start + velocity * localTime;

            rain += rainTrail(p,pos,30.0);
        }else{
            // 撞击地面
            // 计算最终落点
            vec2 hit = start + velocity * fallTime;

            // 落地后的时间
            float waveTime = localTime - fallTime;

            waves += ripple(p,hit,waveTime);
        }
    }


    // 白雨光
    color += vec3(1.0) * rain * 1.5;
    // 白水波
    color += vec3(1.0) * waves;


    // gl_FragColor = vec4(color,1.0);
    float alpha = clamp(rain + waves,0.0,1.0);
    gl_FragColor = vec4(color,alpha);
    
}
`;


function createShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);

    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
    }

    return shader;
}

const vs = createShader(gl.VERTEX_SHADER, vertexShaderSource);
const fs = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);

gl.useProgram(program);


// 全屏三角形
const vertices = new Float32Array([
    -1, -1,
     3, -1,
    -1,  3
]);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(
    gl.ARRAY_BUFFER,
    vertices,
    gl.STATIC_DRAW
);

const position = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(position);
gl.vertexAttribPointer(
    position,
    2,
    gl.FLOAT,
    false,
    0,
    0
);


const timeLoc = gl.getUniformLocation(program, "time");
const resLoc = gl.getUniformLocation(program, "resolution");

const start = performance.now();

function render() {
    let t = (performance.now() - start) / 1000;

    gl.uniform1f(timeLoc, t);
    gl.uniform2f(
        resLoc,
        canvas.width,
        canvas.height
    );

    gl.drawArrays(
        gl.TRIANGLES,
        0,
        3
    );

    requestAnimationFrame(render);
}

render();

</script>

</body>
</html>
